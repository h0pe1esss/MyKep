<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyKep</title>
    <link rel="icon" href="/static/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/applogo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MyKe">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <div id="general" class="page">
        <div class="header day-header-container">
            <button id="prev-day" class="icon-btn">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <div class="day-title-wrapper">
                <h1 id="current-day-title">Розклад</h1>
                <span id="current-date-subtitle" class="accent-text">Тиждень <span id="week-badge">1</span></span>
            </div>
            <button id="next-day" class="icon-btn">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>
        <div id="schedule-content" class="content-container swipe-area">
            <div class="glass card skeleton">Синхронізація даних...</div>
        </div>
    </div>

    <div id="now" class="page active">
        <div class="header">
            <h1>Зараз</h1>
        </div>
        <div id="now-content" class="content-container">
            <div class="glass card skeleton">Завантаження...</div>
        </div>
    </div>

    <div id="settings" class="page">
        <div class="header">
            <h1>Параметри</h1>
        </div>
        
        <div class="glass card accent-border">
            <h2 class="subtitle">Ваша група</h2>
            <div class="select-wrapper">
                <select id="group-select" class="glass-select">
                    <option value="">Завантаження списку...</option>
                </select>
            </div>
        </div>

        <div class="glass card">
            <h2 class="subtitle">Тиждень</h2>
            <p class="text-muted" style="margin-top:-10px; margin-bottom:15px; padding:0 24px;">Перегляд розкладу на інші тижні.</p>
            <div class="select-wrapper">
                <select id="week-select" class="glass-select">
                    <option value="auto">Автоматично (Поточний)</option>
                    <option value="1">Тиждень 1</option>
                    <option value="2">Тиждень 2</option>
                    <option value="3">Тиждень 3</option>
                    <option value="4">Тиждень 4</option>
                </select>
            </div>
        </div>

        <div class="glass card">
            <h2 class="subtitle">Сховище</h2>
            <button id="clear-cache" class="glass-btn">Очистити пам'ять</button>
        </div>
    </div>

    <nav class="navbar glass">
        <a href="#" class="nav-item" data-target="general">
            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 002 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
        </a>
        <a href="#" class="nav-item active" data-target="now">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
        </a>
        <a href="#" class="nav-item" data-target="settings">
            <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.06.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </a>
    </nav>

    <script src="/static/app.js"></script>
</body>
</html>
